<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Outer Circular Border -->
    <circle cx="200" cy="200" r="190" stroke="#1b3d17" stroke-width="4" fill="none" />
    
    <!-- GB Text -->
    <text x="200" y="115" font-family="'Outfit', sans-serif" font-size="120" font-weight="900" fill="#8bc34a" text-anchor="middle">GB</text>
    
    <!-- Floating Gold Icons -->
    <!-- Cog/Gear -->
    <g transform="translate(85, 125) scale(0.6)">
        <path d="M20 10 L25 5 L35 5 L40 10 L45 10 L50 15 L50 25 L45 30 L45 40 L40 45 L30 45 L25 40 L15 40 L10 35 L10 25 L15 20 Z" fill="#d4af37" />
        <circle cx="30" cy="25" r="8" fill="white" />
    </g>
    <!-- Coin -->
    <circle cx="290" cy="110" r="15" fill="#d4af37" />
    <text x="290" y="115" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">$</text>
    <!-- Briefcase/Bag -->
    <g transform="translate(315, 135) scale(0.6)">
        <rect x="5" y="10" width="40" height="30" rx="3" fill="#d4af37" />
        <path d="M15 10 V5 Q25 0 35 10" stroke="#d4af37" stroke-width="3" fill="none" />
    </g>

    <!-- Central Interactive Elements -->
    <!-- Left Hand & Book -->
    <g transform="translate(110, 180)">
        <!-- Hand -->
        <path d="M5 45 Q-10 60 10 90 L30 90 L35 60 Z" fill="#f5f5f5" stroke="#1b3d17" stroke-width="2" />
        <!-- Book -->
        <path d="M5 5 L55 0 L55 50 L5 55 Z" fill="white" stroke="#1b3d17" stroke-width="2" />
        <path d="M55 0 Q30 10 5 5" fill="none" stroke="#1b3d17" stroke-width="1" />
        <!-- Book Details -->
        <line x1="15" y1="15" x2="45" y2="10" stroke="#8bc34a" stroke-width="2" />
        <line x1="15" y1="25" x2="45" y2="20" stroke="#1b3d17" stroke-width="1" />
        <line x1="15" y1="35" x2="45" y2="30" stroke="#1b3d17" stroke-width="1" />
    </g>

    <!-- Right Hand & Phone -->
    <g transform="translate(245, 180)">
        <!-- Hand -->
        <path d="M45 45 Q60 60 40 90 L20 90 L15 60 Z" fill="#f5f5f5" stroke="#1b3d17" stroke-width="2" />
        <!-- Phone -->
        <rect x="-5" y="-5" width="55" height="90" rx="5" fill="#263238" stroke="#1b3d17" stroke-width="2" />
        <rect x="0" y="0" width="45" height="80" rx="2" fill="white" />
        <!-- Phone Screen Content -->
        <path d="M10 20 Q22 10 35 20 T10 40" fill="#8bc34a" opacity="0.5" />
        <circle cx="22.5" cy="72" r="3" fill="#263238" />
    </g>

    <!-- Sync Arrows in Middle -->
    <g transform="translate(200, 220)">
        <path d="M-25 -10 A25 25 0 0 1 25 -10" stroke="#8bc34a" stroke-width="4" stroke-linecap="round" fill="none" />
        <path d="M25 10 A25 25 0 0 1 -25 10" stroke="#8bc34a" stroke-width="4" stroke-linecap="round" fill="none" />
        <path d="M20 -15 L30 -10 L20 -5 Z" fill="#8bc34a" />
        <path d="M-20 5 L-30 10 L-20 15 Z" fill="#8bc34a" />
    </g>

    <!-- Waves -->
    <path d="M60 260 Q130 245 200 260 T340 260" stroke="#4a90e2" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M60 275 Q130 260 200 275 T340 275" stroke="#007bff" stroke-width="3" stroke-linecap="round" fill="none" />

    <!-- GREEN BRIDGE Text -->
    <text x="200" y="340" font-family="'Outfit', sans-serif" font-size="50" font-weight="900" fill="#1b3d17" text-anchor="middle">GREEN BRIDGE</text>
</svg>
